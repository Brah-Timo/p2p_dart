name: p2p_dart
description: >
  A production-ready Dart package for serverless peer-to-peer networking using WebRTC data channels and a Kademlia-based DHT, enabling secure, encrypted, NAT-traversing direct connections without a central server.
  
version: 1.0.0
homepage: https://github.com/Brah-Timo/p2p_dart
repository: https://github.com/Brah-Timo/p2p_dart
issue_tracker: https://github.com/Brah-Timo/p2p_dart/issues
documentation: https://pub.dev/documentation/p2p_dart/latest/

environment:
  sdk: ">=3.0.0 <4.0.0"

topics:
  - dart
  - p2p
  - webrtc
  - dht
  - kademlia
  
dependencies:
  async: ^2.11.0
  collection: ^1.18.0
  convert: ^3.1.1
  crypto: ^3.0.3
  http: ^1.2.1
  logging: ^1.2.0
  pointycastle: ^3.7.3
  rxdart: ^0.27.7
  typed_data: ^1.3.2
  uuid: ^4.3.3

dev_dependencies:
  build_runner: ^2.4.8
  fake_async: ^1.3.1
  lints: ^3.0.0
  mockito: ^5.4.4
  test: ^1.24.0

# Dart SDK platforms
platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
